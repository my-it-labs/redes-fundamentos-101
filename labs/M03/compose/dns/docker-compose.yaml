services:
  servidor-dns:
    image: lab-host:local
    hostname: servidor-dns
    cap_add:
      - NET_ADMIN
    command: ["dnsmasq", "-k", "-C", "/etc/dnsmasq.conf"]
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro
    networks:
      lan-dns:
        ipv4_address: 192.168.52.2

  cliente-dns:
    image: lab-host:local
    hostname: cliente-dns
    cap_add:
      - NET_ADMIN
    networks:
      lan-dns:
        ipv4_address: 192.168.52.10

  servidor-web:
    image: lab-host:local
    hostname: servidor-web
    networks:
      lan-dns:
        ipv4_address: 192.168.52.20

networks:
  lan-dns:
    ipam:
      config:
        - subnet: 192.168.52.0/24
