# Dos sistemas en la misma red para IPv6 manual (M02-03).

services:
  nodo-v6-a:
    image: lab-host:local
    hostname: nodo-v6-a
    cap_add:
      - NET_ADMIN
    networks:
      lan-v6:
        ipv4_address: 10.60.1.2

  nodo-v6-b:
    image: lab-host:local
    hostname: nodo-v6-b
    cap_add:
      - NET_ADMIN
    networks:
      lan-v6:
        ipv4_address: 10.60.1.3

networks:
  lan-v6:
    ipam:
      config:
        - subnet: 10.60.1.0/24
