# Dos sistemas en la misma red para IPv6 manual (M02-03).

services:
  nodo-v6-a:
    image: lab-host:local
    hostname: nodo-v6-a
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.default.disable_ipv6=0
    networks:
      lan-v6:
        ipv4_address: 10.60.1.2
        ipv6_address: 2001:db8:101::10

  nodo-v6-b:
    image: lab-host:local
    hostname: nodo-v6-b
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.default.disable_ipv6=0
    networks:
      lan-v6:
        ipv4_address: 10.60.1.3
        ipv6_address: 2001:db8:101::20

networks:
  lan-v6:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.60.1.0/24
        - subnet: 2001:db8:101::/64
